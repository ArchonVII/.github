name: Bug
description: Report a defect with reproduction steps and observed vs expected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-line description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction Steps
      description: Numbered steps the reader can follow to reproduce.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, version, commit hash, etc.
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Additional Context
      description: Logs, screenshots, links to related issues.
    validations:
      required: false
